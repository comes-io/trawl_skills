name: Release

# Aligned with trawl_cli's release model (2026-07-22): auto-release on every
# push to main — semantic-release only cuts a version when the commits
# warrant one (feat/fix/docs per .releaserc releaseRules). workflow_dispatch
# kept as a manual re-trigger escape hatch. Unlike trawl_cli we do NOT
# paths-ignore '**/*.md': markdown IS this package's product (docs→patch
# releaseRule), so md-only pushes must still release.
on:
  push:
    branches: [main]
    paths-ignore:
      - '.claude/**'
  workflow_dispatch:

# Two pushes in quick succession must never race semantic-release on the
# same npm version/tag (mirrors trawl_cli #88 item 10).
concurrency:
  group: release
  cancel-in-progress: false

permissions:
  contents: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    environment: prod
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.TRAWL_RELEASE || github.token }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          # Pinned: the `lts/*` alias intermittently fails to resolve on hosted
          # runners ("Unable to find LTS release '*'"). 22 is current LTS; engines >=18.
          node-version: '22'

      - name: Semantic Release
        id: semantic
        uses: cycjimmy/semantic-release-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.TRAWL_RELEASE || github.token }}

      - name: Publish to npm via OIDC
        if: steps.semantic.outputs.new_release_published == 'true'
        run: |
          # npm Trusted Publishing (token-less OIDC) requires npm >= 11.5.1;
          # Node 22 ships npm 10.x, which fails with ENEEDAUTH on publish.
          npm install -g npm@latest
          npm version ${{ steps.semantic.outputs.new_release_version }} --no-git-tag-version
          npm publish --provenance --access public
